# ============================================
# LifelineAustralia — Docker Compose
# Orchestrates all 3 servers + PostgreSQL
# ============================================

services:
  # ── PostgreSQL Database ─────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lifeline
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      POSTGRES_DB: lifeline_australia
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeline -d lifeline_australia"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── SERVER 2 — Backend API ──────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://lifeline:${DB_PASSWORD:-changeme_in_production}@db:5432/lifeline_australia?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      PRODUCTION_URLS: ${PRODUCTION_URLS:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-ap-southeast-2}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── SERVER 3 — Realtime Server ──────────────────────
  realtime:
    build:
      context: ./realtime-server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: postgresql://lifeline:${DB_PASSWORD:-changeme_in_production}@db:5432/lifeline_australia?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      PRODUCTION_URLS: ${PRODUCTION_URLS:-}
      API_SERVER_URL: http://backend:4000
    ports:
      - "4001:4001"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── SERVER 1 — Frontend ─────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
        VITE_REALTIME_SERVER_URL: ${VITE_REALTIME_SERVER_URL:-http://localhost:4001}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      realtime:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  pgdata:
